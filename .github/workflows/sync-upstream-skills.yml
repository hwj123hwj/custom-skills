name: Sync Upstream Skills

on:
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）运行
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 也可以手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Web Dependencies
        working-directory: web
        run: npm ci

      - name: Sync upstream skills
        id: sync
        run: |
          set -e

          CHANGED=0
          CONFLICTS=0
          SUMMARY=""
          CONFLICT_SUMMARY=""

          # 从各技能的 SKILL.md frontmatter 读取 upstream 和 upstreamSha
          UPSTREAMS=$(node -e "
            const fs = require('fs');
            const path = require('path');
            const skillsDir = 'skills';
            const dirs = fs.readdirSync(skillsDir);
            for (const dir of dirs) {
              const skillMd = path.join(skillsDir, dir, 'SKILL.md');
              if (!fs.existsSync(skillMd)) continue;
              const content = fs.readFileSync(skillMd, 'utf8');
              const upstreamMatch = content.match(/^upstream:\s*(.+)$/m);
              const shaMatch = content.match(/^upstreamSha:\s*(.+)$/m);
              if (upstreamMatch) {
                const upstream = upstreamMatch[1].trim();
                const sha = shaMatch ? shaMatch[1].trim() : '';
                console.log(dir + ' ' + upstream + ' ' + sha);
              }
            }
          ")

          if [ -z "$UPSTREAMS" ]; then
            echo "No upstream skills found, nothing to sync."
            exit 0
          fi

          while IFS=' ' read -r SKILL_ID UPSTREAM_REPO LAST_SHA; do
            echo "▶ Syncing $SKILL_ID from $UPSTREAM_REPO (base: ${LAST_SHA:-none}) ..."

            TMP_NEW=$(mktemp -d)
            TMP_BASE=$(mktemp -d)

            # clone 上游最新
            git clone --depth=1 "https://github.com/$UPSTREAM_REPO.git" "$TMP_NEW" 2>&1 || {
              echo "⚠️  Failed to clone $UPSTREAM_REPO, skipping."
              rm -rf "$TMP_NEW" "$TMP_BASE"
              continue
            }

            # 确定上游的技能目录
            if [ -d "$TMP_NEW/.claude/skills/$SKILL_ID" ]; then
              SRC_NEW="$TMP_NEW/.claude/skills/$SKILL_ID"
            elif [ -f "$TMP_NEW/SKILL.md" ]; then
              SRC_NEW="$TMP_NEW"
            else
              echo "⚠️  Cannot locate skill directory in $UPSTREAM_REPO, skipping."
              rm -rf "$TMP_NEW" "$TMP_BASE"
              continue
            fi

            UPSTREAM_HEAD=$(git -C "$TMP_NEW" rev-parse HEAD)
            DEST="skills/$SKILL_ID"

            # 如果 SHA 没变，跳过
            if [ "$UPSTREAM_HEAD" = "$LAST_SHA" ]; then
              echo "  ↳ Already up to date ($UPSTREAM_HEAD)."
              rm -rf "$TMP_NEW" "$TMP_BASE"
              continue
            fi

            echo "  ↳ Upstream moved: ${LAST_SHA:-<new>} → $UPSTREAM_HEAD"

            # 获取 base 版本（上次同步的 SHA）用于三路合并
            SRC_BASE=""
            if [ -n "$LAST_SHA" ]; then
              git clone "https://github.com/$UPSTREAM_REPO.git" "$TMP_BASE" --no-checkout 2>&1 || true
              git -C "$TMP_BASE" checkout "$LAST_SHA" -- . 2>/dev/null || true
              # 确定 base 目录
              if [ -d "$TMP_BASE/.claude/skills/$SKILL_ID" ]; then
                SRC_BASE="$TMP_BASE/.claude/skills/$SKILL_ID"
              elif [ -f "$TMP_BASE/SKILL.md" ]; then
                SRC_BASE="$TMP_BASE"
              fi
            fi

            SKILL_CHANGED=0
            SKILL_CONFLICTS=()

            # 遍历上游新版本中的所有文件
            while IFS= read -r -d '' REL_FILE; do
              NEW_FILE="$SRC_NEW/$REL_FILE"
              LOCAL_FILE="$DEST/$REL_FILE"
              BASE_FILE="${SRC_BASE:+$SRC_BASE/$REL_FILE}"

              # 确保目标目录存在
              mkdir -p "$(dirname "$LOCAL_FILE")"

              if [ ! -f "$LOCAL_FILE" ]; then
                # 本地不存在 → 直接新增
                cp "$NEW_FILE" "$LOCAL_FILE"
                echo "    + added: $REL_FILE"
                SKILL_CHANGED=$((SKILL_CHANGED + 1))
              elif [ -n "$BASE_FILE" ] && [ -f "$BASE_FILE" ]; then
                # 三路合并：base=上次上游, ours=本地, theirs=最新上游
                MERGE_TMP=$(mktemp)
                cp "$LOCAL_FILE" "$MERGE_TMP"
                git merge-file "$MERGE_TMP" "$BASE_FILE" "$NEW_FILE" 2>/dev/null; EXIT_CODE=$?
                if [ $EXIT_CODE -eq 0 ]; then
                  if ! diff -q "$MERGE_TMP" "$LOCAL_FILE" > /dev/null 2>&1; then
                    cp "$MERGE_TMP" "$LOCAL_FILE"
                    echo "    ✓ merged: $REL_FILE"
                    SKILL_CHANGED=$((SKILL_CHANGED + 1))
                  fi
                else
                  # 有冲突：保留冲突标记写入本地，供 PR review
                  cp "$MERGE_TMP" "$LOCAL_FILE"
                  SKILL_CONFLICTS+=("$REL_FILE")
                  echo "    ✗ conflict: $REL_FILE"
                  SKILL_CHANGED=$((SKILL_CHANGED + 1))
                fi
                rm -f "$MERGE_TMP"
              else
                # 没有 base 版本（首次同步），只在上游有改动时做简单覆盖
                if ! diff -q "$NEW_FILE" "$LOCAL_FILE" > /dev/null 2>&1; then
                  cp "$NEW_FILE" "$LOCAL_FILE"
                  echo "    ~ updated (no base): $REL_FILE"
                  SKILL_CHANGED=$((SKILL_CHANGED + 1))
                fi
              fi
            done < <(find "$SRC_NEW" -type f \
              ! -path '*/.git/*' ! -name '*.pyc' ! -path '*/__pycache__/*' \
              -printf '%P\0')

            # 更新 SKILL.md frontmatter 中的 upstreamSha
            SKILL_MD="$DEST/SKILL.md"
            if [ -f "$SKILL_MD" ]; then
              if grep -q "^upstreamSha:" "$SKILL_MD"; then
                sed -i "s|^upstreamSha:.*|upstreamSha: $UPSTREAM_HEAD|" "$SKILL_MD"
              else
                # 在第一个 --- 之后插入
                sed -i "0,/^---$/!{0,/^---$/s/^---$/---\nupstreamSha: $UPSTREAM_HEAD/}" "$SKILL_MD"
              fi
              echo "    ↳ Updated upstreamSha in SKILL.md → $UPSTREAM_HEAD"
            fi

            if [ $SKILL_CHANGED -gt 0 ]; then
              CHANGED=$((CHANGED + 1))
              SUMMARY="$SUMMARY\n- \`$SKILL_ID\` synced from \`$UPSTREAM_REPO\` (\`${LAST_SHA:0:7}\` → \`${UPSTREAM_HEAD:0:7}\`)"
              if [ ${#SKILL_CONFLICTS[@]} -gt 0 ]; then
                CONFLICTS=$((CONFLICTS + 1))
                CONFLICT_SUMMARY="$CONFLICT_SUMMARY\n### \`$SKILL_ID\` 冲突文件（需手动解决）\n"
                for f in "${SKILL_CONFLICTS[@]}"; do
                  CONFLICT_SUMMARY="$CONFLICT_SUMMARY- \`$f\`\n"
                done
              fi
            fi

            rm -rf "$TMP_NEW" "$TMP_BASE"
          done <<< "$UPSTREAMS"

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "conflicts=$CONFLICTS" >> "$GITHUB_OUTPUT"
          {
            echo "summary<<EOF"
            echo -e "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "conflict_summary<<EOF"
            echo -e "$CONFLICT_SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Regenerate registry
        if: steps.sync.outputs.changed != '0'
        working-directory: web
        run: npm run generate:registry

      - name: Create Pull Request
        if: steps.sync.outputs.changed != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-upstream-skills
          commit-message: "chore: sync upstream skills"
          title: "chore: sync upstream skills${{ steps.sync.outputs.conflicts != '0' && ' ⚠️ 含冲突' || '' }}"
          body: |
            由 `sync-upstream-skills` CI 自动同步以下第三方技能：

            ${{ steps.sync.outputs.summary }}

            ${{ steps.sync.outputs.conflicts != '0' && format('## ⚠️ 需要手动解决的冲突\n\n以下文件存在三路合并冲突（已写入冲突标记），请在合并前手动解决：\n\n{0}', steps.sync.outputs.conflict_summary) || '✅ 无冲突，可直接合并。' }}

            > 同步逻辑：上游新增文件直接添加；已有文件基于 `upstreamSha` 做三路合并，保留你的本地修改。
          labels: upstream-sync
          delete-branch: true
