name: Registry Check

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to get accurate git timestamps

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            cli/package-lock.json

      - name: Install Web Dependencies
        working-directory: web
        run: npm ci

      - name: Regenerate Registry
        working-directory: web
        run: npm run generate:registry

      - name: Validate Registry
        working-directory: web
        run: npm run validate:registry

      # Check if generated files were committed.
      # If they weren't, the build fails and provides a clear instruction.
      - name: Ensure Generated Files Are Committed
        run: |
          if ! git diff --exit-code -- README.md registry/skills.json web/src/data/skills-data.json web/index.html web/public/robots.txt web/public/sitemap.xml; then
            echo "❌ ERROR: Uncommitted changes in generated files detected."
            echo "👉 PLEASE RUN 'cd web && npm run generate:registry' and commit the updated files to fix this CI error!"
            exit 1
          fi

      - name: Build Web
        working-directory: web
        run: npm run build

      - name: Install CLI Dependencies
        working-directory: cli
        run: npm ci

      - name: Build CLI
        working-directory: cli
        run: npm run build
